<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>产品经理WEB端AI原型组件框架</title>
    <script>
      // GitHub Pages SPA 重定向解决方案
      // 将 404 页面重定向到 index.html，并保留路径信息
      ;(function () {
        var redirect = sessionStorage.redirect
        delete sessionStorage.redirect
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect)
        }
      })()
    </script>
  </head>
  <body>
    <script>
      // 保存当前路径到 sessionStorage，然后重定向到 index.html
      sessionStorage.redirect = location.href
      location.replace(
        location.origin + location.pathname.split('/').slice(0, 2).join('/') + '/index.html'
      )
    </script>
  </body>
</html>
